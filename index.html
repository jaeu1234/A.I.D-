<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>선생님 위치 안내</title>
  <style>
    :root {
      --bg: #f4f5f8;
      --panel: #ffffff;
      --line: #e3e6ef;
      --text: #24272f;
      --muted: #8a90a0;
      --accent: #3b5bdb;
      --accent-soft: #eef2ff;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, .06);
      --shadow-md: 0 6px 16px rgba(16, 24, 40, .09);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

    /* ── 헤더 ───────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 22px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      position: relative;
      z-index: 5;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 800; letter-spacing: -.01em; white-space: nowrap; }
    header .clock { font-size: 13px; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .topnav { display: flex; gap: 2px; background: #f2f3f8; padding: 3px; border-radius: 10px; }
    .topnav a {
      padding: 6px 13px; font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; border-radius: 7px;
      transition: background .15s ease, color .15s ease;
    }
    .topnav a.active { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
    .topnav a:hover:not(.active) { background: #e7e9f3; color: var(--text); }
    header .period-badge {
      margin-left: auto;
      font-size: 12px; font-weight: 700; color: var(--accent);
      background: var(--accent-soft); padding: 5px 12px; border-radius: 20px; white-space: nowrap;
      border: 1px solid #dde3fb;
    }

    /* ── 본문 레이아웃 ───────────────── */
    .layout { flex: 1; display: flex; min-height: 0; }

    /* 좌측 선생님 목록 */
    .sidebar {
      width: 250px; flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column;
    }
    .search-box { padding: 14px; border-bottom: 1px solid var(--line); }
    .search-box input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1px solid var(--line); border-radius: 9px; outline: none;
      background: #fafbfe;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .search-box input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(59,91,219,.12); }
    .teacher-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: #d6d9e4 transparent; }
    .teacher-list::-webkit-scrollbar { width: 6px; }
    .teacher-list::-webkit-scrollbar-thumb { background: #d6d9e4; border-radius: 10px; }
    .teacher-list::-webkit-scrollbar-thumb:hover { background: #c2c6d6; }
    .teacher-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; cursor: pointer; border-bottom: 1px solid #f2f3f7;
      border-left: 3px solid transparent;
      transition: background .12s ease, border-color .12s ease;
    }
    .teacher-item:hover { background: #f7f8fc; }
    .teacher-item.active { background: var(--accent-soft); border-left-color: var(--accent); }
    .teacher-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      color: #fff; font-size: 10.5px; font-weight: 700; letter-spacing: -.3px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.15); }
    .teacher-meta { min-width: 0; }
    .teacher-meta .name { font-size: 14px; font-weight: 600; }
    .teacher-meta .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* 중앙 지도 */
    .map-area { flex: 1; position: relative; display: flex; flex-direction: column; min-width: 0; }
    .floor-tabs {
      display: flex; gap: 4px; padding: 10px 14px;
      background: var(--panel); border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .floor-tabs button {
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      border: 1px solid transparent; background: transparent; border-radius: 8px; cursor: pointer; color: var(--muted);
      transition: background .15s ease, color .15s ease, box-shadow .15s ease;
    }
    .floor-tabs button:hover:not(.active) { background: #f0f2f8; color: var(--text); }
    .floor-tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
    .canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #eceef4; }
    #map { display: block; touch-action: none; }
    .zoom-ctrl { position: absolute; right: 14px; bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
    .zoom-ctrl button {
      width: 38px; height: 38px; font-size: 18px; font-weight: 700;
      background: #fff; border: 1px solid var(--line); border-radius: 10px; cursor: pointer; color: var(--text);
      box-shadow: var(--shadow-md);
      transition: background .15s ease, transform .1s ease;
    }
    .zoom-ctrl button:hover { background: #f7f8fc; }
    .zoom-ctrl button:active { transform: scale(.93); }

    /* 우측 정보 패널 */
    .info-panel {
      width: 310px; flex-shrink: 0;
      background: var(--panel); border-left: 1px solid var(--line);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .info-empty { padding: 48px 24px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .info-head { padding: 20px 20px 15px; border-bottom: 1px solid var(--line); animation: fadeIn .2s ease; }
    .info-head .name { font-size: 20px; font-weight: 800; letter-spacing: -.01em; }
    .info-head .subject { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .now-card {
      margin: 14px 18px; padding: 15px; border-radius: 14px;
      background: linear-gradient(155deg, #eef2ff, #f5f7ff); border: 1px solid #dbe2fb;
      animation: fadeIn .25s ease;
    }
    .now-card .lbl { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .05em; text-transform: uppercase; }
    .now-card .loc { font-size: 19px; font-weight: 800; margin-top: 5px; letter-spacing: -.01em; }
    .now-card .next { font-size: 13px; color: #555; margin-top: 9px; }
    .now-card .next .route-hint { display: inline-block; font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(59,91,219,.1); border-radius: 6px; padding: 1px 6px; margin-left: 4px; }
    .now-card .note { font-size: 12px; color: #c0501a; margin-top: 7px; font-weight: 600; }
    .timeline { padding: 4px 18px 24px; animation: fadeIn .3s ease; }
    .timeline h3 { font-size: 12px; font-weight: 700; color: var(--muted); margin: 14px 0 8px; text-transform: uppercase; letter-spacing: .04em; }
    .tl-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid #f2f3f7; font-size: 13px;
      transition: opacity .2s ease;
    }
    .tl-time { width: 48px; flex-shrink: 0; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .tl-period { width: 42px; flex-shrink: 0; font-weight: 600; }
    .tl-loc { flex: 1; }
    .tl-row.now { background: #fff8dd; margin: 0 -8px; padding: 8px 8px; border-radius: 8px; font-weight: 600; box-shadow: inset 0 0 0 1px #ffe9a8; }
    .tl-row.next .tl-loc { color: var(--accent); font-weight: 600; }
    .tl-row.past { opacity: .45; }
    .status-pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }
    .pill-now { background: #ffe58f; color: #7a5a00; }
    .pill-next { background: #d6e0ff; color: var(--accent); }

    /* 선생님/반 모드 탭 */
    .mode-tabs { display: flex; gap: 4px; padding: 12px 12px 0; }
    .mode-tabs button {
      flex: 1; padding: 7px 0; font-size: 12.5px; font-weight: 700; color: var(--muted);
      background: #f2f3f8; border: none; border-radius: 8px; cursor: pointer;
      transition: background .15s ease, color .15s ease;
    }
    .mode-tabs button.active { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
    .mode-tabs button:hover:not(.active) { background: #e7e9f3; color: var(--text); }

    /* 학급(반) 시간표 표 */
    .class-wrap { padding: 16px 18px; overflow-x: auto; animation: fadeIn .25s ease; }
    .class-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .class-table th, .class-table td { border: 1px solid var(--line); padding: 6px 3px; text-align: center; }
    .class-table th { background: #f7f8fc; color: var(--muted); font-weight: 700; font-size: 10.5px; }
    .class-table td.on { background: var(--accent-soft); }
    .class-table .sub-name { display: block; font-weight: 700; }
    .class-table .sub-teacher { display: block; font-size: 9.5px; color: var(--muted); margin-top: 2px; }
    .class-note { padding: 0 18px 18px; font-size: 11px; color: var(--muted); line-height: 1.5; }

    @media (max-width: 860px) {
      .sidebar { display: none; }
      .info-panel { width: 270px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📍 선생님 위치 안내</h1>
    <nav class="topnav">
      <a href="index.html" class="active">학생</a>
      <a href="admin.html">관리자</a>
      <a href="upload.html">업로드</a>
    </nav>
    <span class="period-badge" id="periodBadge">—</span>
    <span class="clock" id="clock">--:--</span>
  </header>

  <div class="layout">
    <!-- 좌측: 선생님/반 목록 -->
    <aside class="sidebar">
      <div class="mode-tabs">
        <button class="active" id="modeTeacherBtn">선생님</button>
        <button id="modeClassBtn">반</button>
      </div>
      <div class="search-box">
        <input type="text" id="search" placeholder="선생님 이름 · 과목 검색" autocomplete="off" />
      </div>
      <div class="teacher-list" id="teacherList"></div>
    </aside>

    <!-- 중앙: 지도 -->
    <div class="map-area">
      <div class="floor-tabs" id="floorTabs"></div>
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="map"></canvas>
        <div class="zoom-ctrl">
          <button id="zoomIn">＋</button>
          <button id="zoomOut">－</button>
          <button id="zoomReset" title="전체 보기">⤢</button>
        </div>
      </div>
    </div>

    <!-- 우측: 정보 패널 -->
    <aside class="info-panel" id="infoPanel">
      <div class="info-empty">선생님을 선택하면<br>현재 위치와 동선이 표시됩니다.</div>
    </aside>
  </div>

  <script type="module">
    import { PERIODS, DAYS, TEACHERS } from './src/data/schedule.js';
    import { FLOORS, getAllClassrooms, findRoomFloor } from './src/data/floors.js';
    import {
      getCurrentPeriodIndex, getBreakAfterIndex, getTodayIndex, isWeekend, toMins,
    } from './src/lib/time.js';
    import {
      getTeacherLocation, buildTimeline, getNextMove, resolveRoom, getClassSchedule, initSync,
    } from './src/lib/location.js';
    import {
      initCanvas, render, resetZoom, setFloorAndReset,
      zoom, pan, zoomToRoom, hitTestPin, setSelectedId, getCamera,
      getTravelerState, setRouteProgress, invalidateRouteCache,
    } from './src/lib/map.js';

    // ── 상태 ──────────────────────────
    let selectedId = null;
    let selectedClass = null; // { grade, classNum }
    let viewMode = 'teacher'; // 'teacher' | 'class'
    let currentFloor = 1;

    const $ = (id) => document.getElementById(id);
    const canvas = $('map');

    // HTML 이스케이프 (사용자 입력을 innerHTML에 삽입하기 전 필수)
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── 초기화 ────────────────────────
    // 다른 기기(관리자 임시일정 등록, AI 시간표 업로드)의 변경이 Realtime으로
    // 들어오면 현재 화면(선택된 선생님/반)을 다시 그린다.
    function rerenderCurrentSelection() {
      invalidateRouteCache(); // Realtime로 임시일정·AI 시간표가 바뀌면 경로 캐시 무효화
      render();
      if (viewMode === 'teacher' && selectedId) renderInfo();
      if (viewMode === 'class' && selectedClass) renderClassInfo(selectedClass.grade, selectedClass.classNum);
    }

    async function boot() {
      await initSync(rerenderCurrentSelection);
      initCanvas(canvas);
      buildFloorTabs();
      buildTeacherList();
      switchFloor(1);
      updateClock();
    }
    boot();

    // 1분마다 시각·위치 갱신 (선택된 선생님이 이동 중이면 경로 애니메이션 재가동)
    setInterval(() => {
      updateClock();
      render();
      if (selectedId) { renderInfo(); ensureRouteAnim(); }
    }, 30000);
    // 창 크기 변화 대응
    window.addEventListener('resize', () => resetZoom());

    // ── 층 탭 ─────────────────────────
    function buildFloorTabs() {
      const tabs = $('floorTabs');
      // 5층 → 지하 순으로
      [5, 4, 3, 2, 1, 0].forEach(f => {
        const b = document.createElement('button');
        b.textContent = FLOORS[f].label;
        b.dataset.floor = f;
        b.onclick = () => switchFloor(f);
        tabs.appendChild(b);
      });
    }

    function switchFloor(f) {
      currentFloor = f;
      setFloorAndReset(f);
      [...$('floorTabs').children].forEach(b =>
        b.classList.toggle('active', Number(b.dataset.floor) === f));
    }

    // ── 선생님/반 모드 전환 ───────────
    $('modeTeacherBtn').onclick = () => switchMode('teacher');
    $('modeClassBtn').onclick   = () => switchMode('class');

    function switchMode(mode) {
      if (viewMode === mode) return;
      viewMode = mode;
      $('modeTeacherBtn').classList.toggle('active', mode === 'teacher');
      $('modeClassBtn').classList.toggle('active', mode === 'class');
      $('search').value = '';
      $('search').placeholder = mode === 'teacher' ? '선생님 이름 · 과목 검색' : '반 검색 (예: 1-7)';
      stopRouteAnim();
      selectedId = null; setSelectedId(null);
      selectedClass = null;
      renderList();
      renderEmptyInfo();
      render();
    }

    function renderList(filter = '') {
      if (viewMode === 'teacher') buildTeacherList(filter);
      else buildClassList(filter);
    }

    function renderEmptyInfo() {
      $('infoPanel').innerHTML = viewMode === 'teacher'
        ? '<div class="info-empty">선생님을 선택하면<br>현재 위치와 동선이 표시됩니다.</div>'
        : '<div class="info-empty">반을 선택하면<br>주간 시간표가 표시됩니다.</div>';
    }

    $('search').addEventListener('input', e => renderList(e.target.value));

    // ── 선생님 목록 ───────────────────
    function buildTeacherList(filter = '') {
      const list = $('teacherList');
      list.innerHTML = '';
      const q = filter.trim().toLowerCase();
      TEACHERS
        .filter(t => !q || t.name.toLowerCase().includes(q) || t.subject.toLowerCase().includes(q))
        .forEach(t => {
          const div = document.createElement('div');
          div.className = 'teacher-item' + (t.id === selectedId ? ' active' : '');
          div.onclick = () => selectTeacher(t.id);
          div.innerHTML = `
            <div class="teacher-dot" style="background:${t.color}">${t.id}</div>
            <div class="teacher-meta">
              <div class="name">${t.name}</div>
              <div class="sub">${t.subject}</div>
            </div>`;
          list.appendChild(div);
        });
    }

    // ── 반 목록 ───────────────────────
    function buildClassList(filter = '') {
      const list = $('teacherList');
      list.innerHTML = '';
      const q = filter.trim().replace(/\s/g, '').toLowerCase();
      getAllClassrooms()
        .filter(c => !q || `${c.grade}-${c.classNum}`.includes(q) || `${c.grade}학년${c.classNum}반`.includes(q))
        .forEach(c => {
          const div = document.createElement('div');
          const isActive = selectedClass && selectedClass.grade === c.grade && selectedClass.classNum === c.classNum;
          div.className = 'teacher-item' + (isActive ? ' active' : '');
          div.onclick = () => selectClass(c.grade, c.classNum);
          div.innerHTML = `
            <div class="teacher-dot" style="background:var(--accent)">${c.grade}-${c.classNum}</div>
            <div class="teacher-meta">
              <div class="name">${c.grade}학년 ${c.classNum}반</div>
              <div class="sub">${c.floor === 0 ? '지하' : c.floor + '층'}</div>
            </div>`;
          list.appendChild(div);
        });
    }

    // ── 반 선택 ───────────────────────
    function selectClass(grade, classNum) {
      selectedClass = { grade, classNum };
      buildClassList($('search').value);

      const roomId = `${grade}-${classNum}`;
      const floor  = findRoomFloor(roomId);
      if (floor != null && FLOORS[floor]) {
        switchFloor(floor);
        const room = FLOORS[floor].rooms.find(r => r.id === roomId);
        if (room) zoomToRoom(room);
        else render();
      } else {
        render();
      }

      renderClassInfo(grade, classNum);
    }

    // ── 반 시간표 렌더 ────────────────
    function renderClassInfo(grade, classNum) {
      const panel = $('infoPanel');
      const sched = getClassSchedule(grade, classNum);

      const head = '<tr><th>교시</th>' + DAYS.map(d => `<th>${d}</th>`).join('') + '</tr>';
      const rows = PERIODS.map((period, p) => {
        const cells = DAYS.map((_, d) => {
          const cell = sched[d][p];
          return cell
            ? `<td class="on"><span class="sub-name">${escapeHtml(cell.subject)}</span><span class="sub-teacher">${escapeHtml(cell.teacherName)}</span></td>`
            : '<td>·</td>';
        }).join('');
        return `<tr><th>${period.label}</th>${cells}</tr>`;
      }).join('');

      panel.innerHTML = `
        <div class="info-head">
          <div class="name">${grade}학년 ${classNum}반</div>
          <div class="subject">주간 시간표</div>
        </div>
        <div class="class-wrap">
          <table class="class-table">${head}${rows}</table>
        </div>
        <div class="class-note">담당 선생님 정보가 없는 시간(자율학습·동아리 등)은 빈 칸(·)으로 표시됩니다.</div>`;
    }

    // ── 이동 경로 애니메이션 ──────────
    // 쉬는 시간에 선택된 선생님의 이동 점을 경로 위에서 움직이고, 다른 층으로
    // 넘어가면 자동으로 층을 전환한다. 실시간 표류는 눈에 잘 안 보이므로,
    // 선택 직후 0→현재진행률로 짧게 스윕(인트로)한 뒤 1초 틱으로 실시각을 따른다.
    let routeTimer = null, introRAF = null, breakTimeout = null;
    // 이동 점이 마지막으로 관측된 층. "점이 실제로 층을 바꿨을 때"만 따라가기 위한 기준.
    let lastTravelerFloor = null;

    function stopRouteAnim() {
      if (routeTimer)   { clearInterval(routeTimer); routeTimer = null; }
      if (introRAF)     { cancelAnimationFrame(introRAF); introRAF = null; }
      if (breakTimeout) { clearTimeout(breakTimeout); breakTimeout = null; }
      lastTravelerFloor = null;
      setRouteProgress(null);
    }

    // 이동 점이 "직전 관측 층과 다른 층으로 넘어갔을 때"만 그 층으로 따라간다.
    // currentFloor와 매 틱 비교하지 않으므로, 사용자가 수동으로 다른 층을 봐도 튕기지 않는다.
    function followTravelerFloor() {
      if (!selectedId) return false;
      const st = getTravelerState(selectedId);
      const f = st?.pos?.floor;
      if (f == null) return false;
      const crossed = f !== lastTravelerFloor;
      lastTravelerFloor = f;
      if (crossed && f !== currentFloor && FLOORS[f]) { switchFloor(f); return true; }
      return false;
    }

    // 다음 쉬는 시간 시작 시각에 정확히 애니메이션을 켠다(30초 지연·폴링 없이).
    function scheduleNextBreak() {
      const pi = getCurrentPeriodIndex();
      if (pi < 0) return; // 쉬는 시간·방과후엔 예약 안 함
      const now = new Date();
      const nowMs = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()) * 1000;
      const endMs = toMins(PERIODS[pi].end) * 60000;
      const wait = Math.max(endMs - nowMs, 0) + 500;
      breakTimeout = setTimeout(() => { breakTimeout = null; startRouteAnim(); }, wait);
    }

    // 이동 중이 아니면 정적 렌더 + 다음 쉬는 시간 예약, 이동 중이면 인트로 스윕 → 1초 틱.
    function startRouteAnim() {
      stopRouteAnim();
      if (!selectedId) return;
      const st = getTravelerState(selectedId);
      if (!st || !st.moving) { render(); scheduleNextBreak(); return; }

      const target = st.progress, t0 = performance.now(), dur = 1400;
      const ease = (p) => (p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2);
      setRouteProgress(0);
      (function intro(now) {
        if (!selectedId) { introRAF = null; setRouteProgress(null); return; } // 선택 해제 시 즉시 중단
        const p = Math.min((now - t0) / dur, 1);
        setRouteProgress(target * ease(p));
        if (!followTravelerFloor()) render(); // switchFloor는 내부에서 render 호출
        if (p < 1) { introRAF = requestAnimationFrame(intro); }
        else {
          introRAF = null;
          setRouteProgress(null); // 이후 실시각 기준
          routeTimer = setInterval(() => {
            if (!selectedId) return stopRouteAnim();
            const s = getTravelerState(selectedId);
            if (!s || !s.moving) { startRouteAnim(); return; } // 쉬는 시간 종료 → 다음 쉬는 시간 예약
            if (!followTravelerFloor()) render();
          }, 1000);
        }
      })(performance.now());
    }

    // 선택 상태에서 이동이 시작됐는데 애니메이션이 꺼져 있으면 켠다(30초 틱의 안전망).
    function ensureRouteAnim() {
      if (!selectedId || routeTimer || introRAF || breakTimeout) return;
      startRouteAnim();
    }

    // ── 선생님 선택 ───────────────────
    function selectTeacher(id) {
      // 반 모드에서 지도 핀을 클릭해 선생님을 선택한 경우 선생님 모드로 전환
      if (viewMode !== 'teacher') {
        viewMode = 'teacher';
        $('modeTeacherBtn').classList.add('active');
        $('modeClassBtn').classList.remove('active');
        $('search').value = '';
        $('search').placeholder = '선생님 이름 · 과목 검색';
      }
      selectedClass = null;
      selectedId = id;
      setSelectedId(id);
      buildTeacherList($('search').value);

      // 현재 위치가 있는 층으로 이동 후 해당 방으로 줌.
      // 쉬는 시간(pi<0)에는 직전 교시 위치를 기준으로 잡아 이동 경로의 출발점이 보이게 한다.
      const day = getTodayIndex();
      const pi  = getCurrentPeriodIndex();
      const breakAf = getBreakAfterIndex();
      const curPi = pi >= 0 ? pi : (breakAf >= 0 ? breakAf : -1);
      const loc = getTeacherLocation(id, day, curPi);
      // loc.floor가 없으면(교무실 등 층이 정해지지 않은 위치) 현재 보고 있는 층을 유지
      const targetFloor = loc.floor ?? currentFloor;

      if (FLOORS[targetFloor]) switchFloor(targetFloor);
      const room = resolveRoom(loc.room, loc.floor, currentFloor, FLOORS[currentFloor]);
      if (room) zoomToRoom(room);
      else render();

      renderInfo();
      startRouteAnim();
    }

    // ── 정보 패널 렌더 ────────────────
    function renderInfo() {
      const panel = $('infoPanel');
      const t = TEACHERS.find(x => x.id === selectedId);
      if (!t) { panel.innerHTML = '<div class="info-empty">선생님을 선택하면<br>현재 위치와 동선이 표시됩니다.</div>'; return; }

      const day = getTodayIndex();
      const pi  = getCurrentPeriodIndex();
      const cur = getTeacherLocation(t.id, day, pi);
      const move = getNextMove(t.id);
      const timeline = buildTimeline(t.id);

      let nextHtml = '';
      if (move && move.toLoc) {
        const verb = move.isMovingNow ? '이동 중 →' : '다음';
        const st = getTravelerState(t.id);
        let hint = '';
        if (st.route && st.route.crossFloor) {
          hint = ` <span class="route-hint">${st.route.fromFloor}층→${st.route.toFloor}층 · 계단</span>`;
        }
        const pct = (move.isMovingNow && st.route)
          ? ` <span class="route-hint">${Math.round(st.progress * 100)}%</span>` : '';
        nextHtml = `<div class="next">${verb} <b>${escapeHtml(move.toPeriod.label)}</b> · ${escapeHtml(move.toLoc.label)}${hint}${pct}</div>`;
      }
      const noteHtml = cur.note ? `<div class="note">📌 ${escapeHtml(cur.note)}</div>` : '';

      const rows = timeline.map(({ pi, period, loc, status }) => {
        let pill = '';
        if (status === 'now')  pill = '<span class="status-pill pill-now">현재</span>';
        if (status === 'next') pill = '<span class="status-pill pill-next">다음</span>';
        return `
          <div class="tl-row ${status}">
            <span class="tl-time">${period.start}</span>
            <span class="tl-period">${period.label}</span>
            <span class="tl-loc">${escapeHtml(loc.label)}${pill}</span>
          </div>`;
      }).join('');

      panel.innerHTML = `
        <div class="info-head">
          <div class="name">${escapeHtml(t.name)} <span style="font-size:14px;color:${t.color}">●</span></div>
          <div class="subject">${escapeHtml(t.subject)} 선생님</div>
        </div>
        <div class="now-card">
          <div class="lbl">지금 위치</div>
          <div class="loc">${escapeHtml(cur.label)}</div>
          ${nextHtml}
          ${noteHtml}
        </div>
        <div class="timeline">
          <h3>${DAYS[day]}요일 동선</h3>
          ${rows}
        </div>`;
    }

    // ── 시계 · 교시 뱃지 ──────────────
    function updateClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const weekendNote = isWeekend() ? ' · 주말(월요일 시간표 기준)' : '';
      $('clock').textContent = `${DAYS[getTodayIndex()]}요일 ${hh}:${mm}${weekendNote}`;
      const pi = getCurrentPeriodIndex();
      $('periodBadge').textContent = pi >= 0 ? PERIODS[pi].label : '쉬는 시간';
    }

    // ── 캔버스 인터랙션 ───────────────
    // 휠 줌
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      zoom(factor, e.clientX - rect.left, e.clientY - rect.top);
    }, { passive: false });

    // 드래그 패닝 & 클릭 판정
    let dragging = false, moved = false, lastX = 0, lastY = 0;
    canvas.addEventListener('pointerdown', e => {
      dragging = true; moved = false; lastX = e.clientX; lastY = e.clientY;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      pan(dx, dy);
      lastX = e.clientX; lastY = e.clientY;
    });
    canvas.addEventListener('pointerup', e => {
      dragging = false;
      if (!moved) {
        const rect = canvas.getBoundingClientRect();
        const id = hitTestPin(e.clientX - rect.left, e.clientY - rect.top);
        if (id) selectTeacher(id);
      }
    });

    // 줌 버튼
    $('zoomIn').onclick  = () => zoom(1.3);
    $('zoomOut').onclick = () => zoom(1 / 1.3);
    $('zoomReset').onclick = () => resetZoom();
  </script>
</body>
</html>
